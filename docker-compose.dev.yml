name: pdfparse-dev
services:
  app:
    build: .
    container_name: pdfparse-dev
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8000" # Map host 8080 to container 8000
    volumes:
      - ./data_dev/uploads:/app/uploads
      - ./data_dev/logs:/app/logs
      - ./data_dev:/app/data # Map the whole folder
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SECRET_KEY=dev-secret-key-123
      - PORT=8000
      - DATABASE_PATH=/app/data/documents.db
      - FLASK_ENV=development # Enables debug mode
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
