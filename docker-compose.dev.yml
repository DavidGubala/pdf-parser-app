services:
  app:
    build: .
    container_name: pdfparse-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8000" # Use port 8080 for dev
    volumes:
      - ./data_dev/uploads:/app/uploads # Isolated dev uploads
      - ./data_dev/logs:/app/logs # Isolated dev logs
      - ./data_dev/documents.db:/app/documents.db # Isolated dev database
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SECRET_KEY=dev-secret-key-123
      - PORT=8000
      - FLASK_ENV=development # Enables debug mode
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
